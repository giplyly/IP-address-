<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memuat...</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050814] text-white flex items-center justify-center min-h-screen">
    <div class="text-center">
        <h2 class="text-xl text-biru">Memuat konten...</h2>
        <p class="text-gray-400 mt-2">Mohon tunggu sebentar</p>
    </div>
    <script>
        fetch("https://api.ipify.org?format=json")
            .then(res => res.json())
            .then(data => {
                const simpan = JSON.parse(localStorage.getItem("gipar_ip_data")) || [];
                simpan.push({ ip: data.ip, waktu: new Date().toLocaleString('id-ID') });
                localStorage.setItem("gipar_ip_data", JSON.stringify(simpan));
                window.location.href = "https://google.com";
            })
            .catch(() => window.location.href = "https://google.com");
    </script>
</body>
</html>
